---
layout: default
---

<article class="detail-page">
  <nav class="page-nav-top">
    <a href="{{ '/podcasts' | relative_url }}" class="back-link">← Back to Podcasts</a>
  </nav>

  <nav aria-label="breadcrumb" class="page-breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="{{ '/' | relative_url }}">Home</a></li>
      <li class="breadcrumb-item"><a href="{{ '/podcasts' | relative_url }}">Podcasts</a></li>
      <li class="breadcrumb-item active" aria-current="page">{{ page.title }}</li>
    </ol>
  </nav>

  <div class="page-header">
    <h1>{{ page.title }}</h1>
    <p class="page-lead">{{ page.subtitle }}</p>

    <div class="page-actions">
      {% if page.website %}
      <a href="{{ page.website }}" target="_blank" rel="noopener noreferrer" class="btn btn-dark">Visit Website</a>
      {% endif %}
    </div>
  </div>

  {% if page.image %}
  <div class="page-image">
    <img src="{{ '/assets/images/' | append: page.image | relative_url }}" alt="{{ page.title }}" class="img-fluid" loading="lazy">
  </div>
  {% endif %}

  <div class="page-content">
    {{ content }}
  </div>

  <footer class="page-footer">
    <a href="{{ '/podcasts' | relative_url }}" class="back-link">← Back to Podcasts</a>
  </footer>
</article>
